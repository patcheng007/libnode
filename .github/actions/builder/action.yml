runs:
  using: "composite"
  steps:
    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        registry-url: "https://npm.pkg.github.com"
        scope: "@kungfu-trader"

    - name: Fix yarn.lock for overseas registry
      shell: bash
      run: |
        python3 -c "
        content = open('yarn.lock').read()
        content = content.replace(
          'https://registry.nlark.com/sax/download/sax-1.2.4.tgz#2816234e2378bddc4e5354fab5caa895df7100d9',
          'https://registry.yarnpkg.com/sax/-/sax-1.2.4.tgz#2816234e2378bddc4e5354fab5caa895df7100d9'
        )
        content = content.replace(
          'integrity sha1-KBYjTiN4vdxOU1T6tcqold9xANk=',
          'integrity sha512-NqVDv9TpANUjFm0N8uM5GxL36UgKi9/atZw+x7YFnQ8ckwFGKrl4xX4yWtrey3UJm5nP1kUbnYgLopqWNSRhWw=='
        )
        open('yarn.lock', 'w').write(content)
        print('yarn.lock patched successfully')
        "

    - name: Setup Yarn environment
      env:
        KF_SKIP_FALLBACK_BUILD: true
      shell: bash
      run: yarn --network-timeout=5000000 install --frozen-lockfile

    - name: Make libnode
      shell: bash
      # Workaround for gyp not able to find nasm.exe when run on GitHub Windows runner
      # -Wno-enum-constexpr-conversion: suppress Clang 15+ error when building Node.js V8 on macos-14
      env:
        CFLAGS: "-Wno-enum-constexpr-conversion"
        CXXFLAGS: "-Wno-enum-constexpr-conversion"
      run: yarn make

    - name: Build
      env:
        KF_SKIP_MAKE_LIBNODE: true
      shell: bash
      run: yarn build

    - name: Package
      shell: bash
      run: yarn package

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        # https://docs.github.com/en/actions/reference/context-and-expression-syntax-for-github-actions#github-context
        name: "libnode-${{env.BUILDER_OS}}-${{github.actor}}-${{github.sha}}"
        path: |
          **/build/stage/*/v*/v*/*.*
